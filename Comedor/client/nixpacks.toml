onlyIncludeFiles = ["package.json", "pnpm-lock.yaml"]

providers = ["node"]

[variables]
NODE_VERSION = "20"
PNPM_FLAGS = "--ignore-scripts=false"

[phases.install]
cmds = [
  "npm install -g corepack",
  "corepack enable",
  "corepack prepare pnpm@9.1.0 --activate",
  "pnpm install --no-frozen-lockfile"
]

[phases.build]
cmds = ["pnpm run build"]